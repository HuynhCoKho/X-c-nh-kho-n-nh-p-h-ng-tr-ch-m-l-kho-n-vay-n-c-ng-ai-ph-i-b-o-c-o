<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Xác định khoản vay nhập khẩu trả chậm</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #172126;
      --muted: #5b6770;
      --line: #d8dee3;
      --paper: #ffffff;
      --soft: #f5f7f8;
      --accent: #176f5d;
      --accent-2: #b78318;
      --bad: #a13d2d;
      --good-bg: #e7f4ef;
      --bad-bg: #f7e9e6;
      font-family: Arial, Helvetica, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #eef2f3;
      color: var(--ink);
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 18px 40px;
    }

    .title {
      margin: 0 0 20px;
      font-size: clamp(22px, 3vw, 34px);
      line-height: 1.15;
      letter-spacing: 0;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(320px, 480px);
      gap: 18px;
      align-items: start;
    }

    section,
    aside {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 8px 22px rgba(23, 33, 38, 0.06);
    }

    .tool {
      padding: 18px;
    }

    .form-grid {
      display: grid;
      gap: 14px;
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    input,
    select,
    button {
      font: inherit;
    }

    input,
    select {
      width: 100%;
      min-height: 42px;
      border: 1px solid #b8c2c9;
      border-radius: 6px;
      padding: 9px 10px;
      background: #fff;
      color: var(--ink);
      font-size: 15px;
    }

    input:focus,
    select:focus,
    button:focus-visible {
      outline: 3px solid rgba(23, 111, 93, 0.22);
      border-color: var(--accent);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    button {
      min-height: 42px;
      border: 1px solid var(--accent);
      border-radius: 6px;
      padding: 9px 14px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font-weight: 700;
    }

    button.secondary {
      background: #fff;
      color: var(--accent);
    }

    .result {
      margin-top: 18px;
      border-top: 1px solid var(--line);
      padding-top: 16px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      border-radius: 6px;
      padding: 7px 10px;
      font-weight: 700;
      color: var(--muted);
      background: var(--soft);
    }

    .status.good {
      color: var(--accent);
      background: var(--good-bg);
    }

    .status.bad {
      color: var(--bad);
      background: var(--bad-bg);
    }

    .result-grid {
      display: grid;
      grid-template-columns: minmax(170px, 1fr) minmax(140px, 180px);
      gap: 1px;
      margin-top: 14px;
      background: var(--line);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }

    .result-grid div {
      background: #fff;
      padding: 11px 12px;
      min-height: 42px;
    }

    .result-grid .label {
      color: var(--muted);
      font-weight: 700;
    }

    .result-grid .value {
      text-align: right;
      font-weight: 700;
    }

    .rule {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .reference {
      padding: 14px;
    }

    .reference h2 {
      margin: 0 0 12px;
      font-size: 18px;
      letter-spacing: 0;
    }

    .reference img {
      display: block;
      width: 100%;
      height: auto;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
    }

    .error {
      min-height: 20px;
      margin-top: 10px;
      color: var(--bad);
      font-weight: 700;
      font-size: 13px;
    }

    @media (max-width: 880px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .result-grid {
        grid-template-columns: 1fr;
      }

      .result-grid .value {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1 class="title">Xác định khoản vay nước ngoài dưới hình thức nhập khẩu hàng hóa trả chậm</h1>

    <div class="layout">
      <section class="tool" aria-label="Công cụ xác định khoản vay">
        <div class="form-grid">
          <label>
            Ngày vận tải đơn (B/L)
            <input id="blDate" type="date" value="2025-12-15">
          </label>

          <label>
            Ngày kiểm tra ghi trên tờ khai hải quan
            <input id="customsDate" type="date" value="2026-02-28">
          </label>

          <label>
            NHTM yêu cầu bộ chứng từ phải có vận tải đơn?
            <select id="bankRequiresBl">
              <option value="co" selected>Có</option>
              <option value="khong">Không</option>
            </select>
          </label>

          <label>
            Ngày dự kiến trả nợ cuối cùng
            <input id="finalPaymentDate" type="date" value="2027-07-30">
          </label>
        </div>

        <div class="actions">
          <button id="calculateBtn" type="button">Tính kết quả</button>
          <button id="sampleBtn" class="secondary" type="button">Dữ liệu mẫu</button>
          <button id="copyBtn" class="secondary" type="button">Sao chép kết quả</button>
        </div>

        <div id="error" class="error" role="alert"></div>

        <div class="result" aria-live="polite">
          <span id="status" class="status">Chưa tính</span>

          <div class="result-grid">
            <div class="label">Ngày rút vốn đầu tiên</div>
            <div id="withdrawalDate" class="value">-</div>

            <div class="label">Khoản vay dưới hình thức nhập khẩu hàng hóa?</div>
            <div id="loanResult" class="value">-</div>

            <div class="label">Kỳ bắt đầu thực hiện báo cáo tháng</div>
            <div id="reportStart" class="value">-</div>

            <div class="label">Kỳ kết thúc báo cáo</div>
            <div id="reportEnd" class="value">-</div>
          </div>

          <p id="ruleText" class="rule"></p>
        </div>
      </section>

      <aside class="reference" aria-label="Quy định tham chiếu">

      loanResult: document.getElementById("loanResult"),
      reportStart: document.getElementById("reportStart"),
      reportEnd: document.getElementById("reportEnd"),
      ruleText: document.getElementById("ruleText"),
      calculateBtn: document.getElementById("calculateBtn"),
      sampleBtn: document.getElementById("sampleBtn"),
      copyBtn: document.getElementById("copyBtn")
    };

    function parseDate(value) {
      if (!value) return null;
      const parts = value.split("-").map(Number);
      if (parts.length !== 3 || parts.some(Number.isNaN)) return null;
      return new Date(parts[0], parts[1] - 1, parts[2]);
    }

    function addDays(date, days) {
      const next = new Date(date);
      next.setDate(next.getDate() + days);
      return next;
    }

    function formatDate(date) {
      if (!date) return "";
      return new Intl.DateTimeFormat("vi-VN", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric"
      }).format(date);
    }

    function setResult({ withdrawalDate, isLoan, reportStart, reportEnd, ruleText }) {
      fields.withdrawalDate.textContent = formatDate(withdrawalDate);
      fields.loanResult.textContent = isLoan ? "đúng" : "không";
      fields.reportStart.textContent = reportStart ? formatDate(reportStart) : "";
      fields.reportEnd.textContent = reportEnd ? formatDate(reportEnd) : "";
      fields.ruleText.textContent = ruleText;
      fields.status.textContent = isLoan ? "Kết quả: đúng" : "Kết quả: không";
      fields.status.className = isLoan ? "status good" : "status bad";
    }

    function calculate() {
      fields.error.textContent = "";

      const blDate = parseDate(fields.blDate.value);
      const customsDate = parseDate(fields.customsDate.value);
      const finalPaymentDate = parseDate(fields.finalPaymentDate.value);
      const requiresBl = fields.bankRequiresBl.value === "co";

      if (!finalPaymentDate) {
        fields.error.textContent = "Vui lòng nhập ngày dự kiến trả nợ cuối cùng.";
        return null;
      }

      if (requiresBl && !blDate) {
        fields.error.textContent = "Vui lòng nhập ngày vận tải đơn (B/L).";
        return null;
      }

      if (!requiresBl && !customsDate) {
        fields.error.textContent = "Vui lòng nhập ngày kiểm tra ghi trên tờ khai hải quan.";
        return null;
      }

      const baseDate = requiresBl ? blDate : customsDate;
      const offsetDays = requiresBl ? 90 : 45;
      const withdrawalDate = addDays(baseDate, offsetDays);
      const isLoan = finalPaymentDate > withdrawalDate;
      const reportStart = isLoan ? withdrawalDate : null;
      const reportEnd = isLoan ? finalPaymentDate : null;
      const ruleText = requiresBl
        ? "Theo công thức trong file: ngân hàng yêu cầu B/L nên ngày rút vốn đầu tiên = ngày B/L + 90 ngày."
        : "Theo công thức trong file: ngân hàng không yêu cầu B/L nên ngày rút vốn đầu tiên = ngày kiểm tra hải quan + 45 ngày.";

      const result = { withdrawalDate, isLoan, reportStart, reportEnd, ruleText };
      setResult(result);
      return result;
    }

    function resetSample() {
      fields.blDate.value = "2025-12-15";
      fields.customsDate.value = "2026-02-28";
      fields.bankRequiresBl.value = "co";
      fields.finalPaymentDate.value = "2027-07-30";
      calculate();
    }

    async function copyResult() {
      const result = calculate();
      if (!result) return;

      const text = [
        `Ngày rút vốn đầu tiên: ${formatDate(result.withdrawalDate)}`,
        `Khoản vay dưới hình thức nhập khẩu hàng hóa: ${result.isLoan ? "đúng" : "không"}`,
        `Kỳ bắt đầu thực hiện báo cáo tháng: ${result.reportStart ? formatDate(result.reportStart) : ""}`,
        `Kỳ kết thúc báo cáo: ${result.reportEnd ? formatDate(result.reportEnd) : ""}`
      ].join("\n");

      try {
        await navigator.clipboard.writeText(text);
        fields.error.textContent = "Đã sao chép kết quả.";
      } catch {
        fields.error.textContent = "Trình duyệt chưa cho phép sao chép tự động.";
      }
    }

    fields.calculateBtn.addEventListener("click", calculate);
    fields.sampleBtn.addEventListener("click", resetSample);
    fields.copyBtn.addEventListener("click", copyResult);

    for (const input of [fields.blDate, fields.customsDate, fields.bankRequiresBl, fields.finalPaymentDate]) {
      input.addEventListener("change", calculate);
    }

    calculate();
  </script>
</body>
</html>
